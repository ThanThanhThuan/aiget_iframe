<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple PWA Page</title>
  <!-- Manifest (optional, only needed if you want installable PWA features) -->
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <h1>Hello, world!</h1>
  <p>This is a simple working HTML file.</p>

  <script>
    // Register service worker (optional, only if you want PWA features)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: './' })
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.error('Service Worker registration failed:', err));
    }
  </script>
  <script>
    (function () {
      const CHAT_URL = "https://www.aiget.art/mychat?api_key=CBZBJH";

      // Inject CSS
      const style = document.createElement('style');
      style.textContent = `
    #aigetToggle { position: fixed; bottom: 20px; left: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border: none; cursor: pointer; box-shadow: 0 4px 18px rgba(99,102,241,.45); z-index: 100000; font-size: 24px; transition: transform .2s; display: flex; align-items: center; justify-content: center; }
    #aigetToggle:hover { transform: scale(1.1); }
    #aigetBox { position: fixed; bottom: 88px; left: 20px; width: 400px; height: 690px; max-width: 90vw; max-height: 80vh; border-radius: 16px; overflow: visible; box-shadow: 0 12px 48px rgba(0,0,0,0.22); background: white; z-index: 99999; display: none; }
    #aigetBox.open { display: block; }
    #aigetInner { width: 100%; height: 100%; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    #aigetHeader { height: 32px; background: #f8fafc; cursor: grab; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #e2e8f0; position: relative; flex-shrink: 0; user-select: none; }
    #aigetHeader .pill { width: 40px; height: 4px; background: #cbd5e1; border-radius: 2px; }
    #aigetHeader .actions { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 4px; }
    .aiget-btn { background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0 4px; display: flex; align-items: center; transition: color .2s; }
    .aiget-btn:hover { color: #334155; }
    .aiget-btn.active { color: #28a745 !important; background: rgba(40, 167, 69, 0.1); border-radius: 4px; }
    #aigetBox iframe { width: 100%; height: 100%; border: none; flex-grow: 1; }
    .aiget-resizer { position: absolute; z-index: 100; }
    .aiget-resizer-r { top: 0; right: -5px; width: 10px; height: 100%; cursor: e-resize; }
    .aiget-resizer-b { bottom: -5px; left: 0; width: 100%; height: 10px; cursor: s-resize; }
  `;
      document.head.appendChild(style);

      // Create UI
      const toggle = document.createElement('button');
      toggle.id = 'aigetToggle';
      toggle.innerHTML = '💬';
      document.body.appendChild(toggle);

      const box = document.createElement('div');
      box.id = 'aigetBox';
      box.innerHTML = `
    <div class="aiget-resizer aiget-resizer-r" data-dir="r"></div>
    <div class="aiget-resizer aiget-resizer-b" data-dir="b"></div>
    <div id="aigetInner">
      <div id="aigetHeader">
        <div class="pill"></div>
        <div class="actions">
          <button class="aiget-btn" id="aigetOpt" title="Tùy chọn nhanh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </button>
          <button class="aiget-btn" id="aigetClear" title="Xóa cuộc trò chuyện">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
          <button class="aiget-btn" id="aigetMax" title="Phóng to">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          </button>
          <button class="aiget-btn" id="aigetReset" title="Kích thước mặc định">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
          </button>
          <button class="aiget-btn" id="aigetClose" title="Đóng" style="font-size:18px;">✕</button>
        </div>
      </div>
      <iframe src="${CHAT_URL}" allow="microphone; camera"></iframe>
    </div>
  `;
      document.body.appendChild(box);

      let isMax = false, preStyles = {}, dragging = false, dragX = 0, dragY = 0, ox = 0, oy = 0;
      toggle.onclick = () => box.classList.toggle('open');
      document.getElementById('aigetClose').onclick = () => box.classList.remove('open');
      document.getElementById('aigetClear').onclick = () => {
        const frame = box.querySelector('iframe');
        if (frame && frame.contentWindow) frame.contentWindow.postMessage({ type: 'getrio-request-clear' }, '*');
      };
      document.getElementById('aigetOpt').onclick = () => {
        const btn = document.getElementById('aigetOpt');
        btn.classList.toggle('active');
        const frame = box.querySelector('iframe');
        if (frame && frame.contentWindow) frame.contentWindow.postMessage({ type: 'getrio-toggle-options' }, '*');
      };

      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'getrio-options-closed') {
          const btn = document.getElementById('aigetOpt');
          if (btn) btn.classList.remove('active');
        }
      });

      document.getElementById('aigetMax').onclick = () => {
        const btn = document.getElementById('aigetMax');
        if (!isMax) {
          preStyles = { w: box.style.width, h: box.style.height, t: box.style.transform, b: box.style.bottom, l: box.style.left };
          Object.assign(box.style, { width: '100vw', height: '100vh', transform: 'none', bottom: '0', left: '0', borderRadius: '0', maxWidth: '100vw', maxHeight: '100vh' });
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="4" width="12" height="12" rx="2" ry="2"></rect><path d="M4 8v10a2 2 0 0 0 2 2h10"></path></svg>';
          btn.title = 'Thu nhỏ';
          isMax = true;
        } else {
          Object.assign(box.style, { width: preStyles.w || '400px', height: preStyles.h || '690px', transform: preStyles.t || 'none', bottom: preStyles.b || '88px', left: preStyles.l || '20px', borderRadius: '16px', maxWidth: '90vw', maxHeight: '80vh' });
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>';
          btn.title = 'Phóng to';
          isMax = false;
        }
      };

      document.getElementById('aigetReset').onclick = () => {
        Object.assign(box.style, { width: '400px', height: '690px', transform: 'none', bottom: '88px', left: '20px', borderRadius: '16px', maxWidth: '90vw', maxHeight: '80vh' });
        ox = 0; oy = 0; isMax = false;
        const maxBtn = document.getElementById('aigetMax');
        maxBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>';
        maxBtn.title = 'Phóng to';
      };

      const head = document.getElementById('aigetHeader');
      head.onmousedown = (e) => {
        if (isMax || e.target.closest('button')) return;
        dragging = true; dragX = e.clientX - ox; dragY = e.clientY - oy;
        head.style.cursor = 'grabbing';
      };
      document.onmousemove = (e) => {
        if (dragging) { ox = e.clientX - dragX; oy = e.clientY - dragY; box.style.transform = `translate3d(${ox}px, ${oy}px, 0)`; }
      };
      document.onmouseup = () => { dragging = false; head.style.cursor = 'grab'; };
    })();
  </script>
</body>

</html>
