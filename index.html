<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGet Chat Widget</title>
    <style>
        /* ============================================================
           CONFIGURATION — edit these two values to customise the widget
           ============================================================ */
        :root {
            --api-key: "AAAAAA";          /* Your API key */
            --chat-url: "https://www.aiget.art"; /* Base URL of your deployment */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f4f8; min-height: 100vh; }

        /* ── Toggle button ──────────────────────────────────────────── */
        #mychatToggleBtn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(99,102,241,.45);
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .2s, box-shadow .2s;
        }
        #mychatToggleBtn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(99,102,241,.6); }

        /* ── Chat container ─────────────────────────────────────────── */
        #mychatContainer {
            position: fixed;
            bottom: 88px;
            left: 20px;
            width: 400px;
            height: 600px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 110px);
            display: none;
            border-radius: 16px;
            overflow: visible;   /* allows resizers to extend outside */
            box-shadow: 0 12px 48px rgba(0,0,0,0.22);
            background: white;
            z-index: 99999;
        }
        #mychatContainer.open { display: block; }

        /* inner clip so iframe stays inside rounded corners */
        #mychatInner {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Drag handle ────────────────────────────────────────────── */
        #mychatDragHandle {
            height: 32px;
            background: #f8fafc;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #e2e8f0;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            position: relative;
            flex-shrink: 0;
            user-select: none;
        }
        #mychatDragHandle .pill { width: 40px; height: 4px; background: #cbd5e1; border-radius: 2px; }

        /* handle buttons */
        .handle-btn {
            background: none; border: none; cursor: pointer;
            color: #94a3b8; padding: 0 5px; line-height: 1;
            font-size: 18px; transition: color .15s;
        }
        .handle-btn:hover { color: #334155; }
        #closeBtn:hover { color: #ef4444; }
        #menuBtn { font-size: 22px; }

        .handle-actions {
            position: absolute; right: 8px; top: 50%;
            transform: translateY(-50%);
            display: flex; align-items: center; gap: 2px;
        }

        /* ── Dropdown ───────────────────────────────────────────────── */
        #mychatDropdown {
            display: none; position: absolute; top: 38px; right: 8px;
            background: white; border: 1px solid #e2e8f0;
            border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,.12);
            z-index: 999; min-width: 150px; overflow: hidden;
        }
        #mychatDropdown.open { display: block; }
        #mychatDropdown button {
            display: block; width: 100%; text-align: left;
            padding: 10px 16px; background: none; border: none;
            cursor: pointer; font-size: 13px; color: #374151;
            transition: background .12s;
        }
        #mychatDropdown button:hover { background: #f1f5f9; }
        #mychatDropdown .danger:hover { background: #fee2e2; color: #dc2626; }

        /* ── iframe ─────────────────────────────────────────────────── */
        #mychatFrame {
            width: 100%;
            flex: 1;
            border: none;
            background: white;
            display: block;
        }

        /* ── Resizers ───────────────────────────────────────────────── */
        .resizer { position: absolute; z-index: 100; }
        .resizer-r  { top: 0; right: -5px; width: 10px; height: 100%; cursor: e-resize; }
        .resizer-l  { top: 0; left:  -5px; width: 10px; height: 100%; cursor: w-resize; }
        .resizer-b  { bottom: -5px; left: 0; width: 100%; height: 10px; cursor: s-resize; }
        .resizer-t  { top: -5px;   left: 0; width: 100%; height: 10px; cursor: n-resize; }
        .resizer-br { bottom: -5px; right: -5px; width: 16px; height: 16px; cursor: se-resize; }
    </style>
</head>
<body>

    <!-- ── Toggle button ──────────────────────────────────── -->
    <button id="mychatToggleBtn" title="Open chat">💬</button>

    <!-- ── Chat widget ────────────────────────────────────── -->
    <div id="mychatContainer">
        <!-- Resize handles -->
        <div class="resizer resizer-r"  data-dir="r"></div>
        <div class="resizer resizer-l"  data-dir="l"></div>
        <div class="resizer resizer-b"  data-dir="b"></div>
        <div class="resizer resizer-t"  data-dir="t"></div>
        <div class="resizer resizer-br" data-dir="br"></div>

        <div id="mychatInner">
            <!-- Drag handle -->
            <div id="mychatDragHandle">
                <div class="pill"></div>
                <div class="handle-actions">
                    <button class="handle-btn" id="menuBtn" title="Menu">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                    </button>
                    <button class="handle-btn" id="restoreBtn" title="Restore size">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                    </button>
                    <button class="handle-btn" id="reloadBtn" title="Reload chat">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    <button class="handle-btn" id="closeBtn" title="Close">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="12"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div id="mychatDropdown">
                    <button class="danger" id="clearBtn">🗑 Clear Chats</button>
                </div>
            </div>

            <iframe id="mychatFrame" src="" allow="microphone; camera"></iframe>
        </div>
    </div>

    <script>
        // ============================================================
        //  ↓↓ CONFIGURE HERE ↓↓
        // ============================================================
        const API_KEY  = 'AAAAAA';                  // Your API key
        const BASE_URL = 'https://www.aiget.art';   // Your deployment URL
        // ============================================================

        const container  = document.getElementById('mychatContainer');
        const frame      = document.getElementById('mychatFrame');
        const toggleBtn  = document.getElementById('mychatToggleBtn');
        const dragHandle = document.getElementById('mychatDragHandle');
        const dropdown   = document.getElementById('mychatDropdown');

        // Build iframe src with api_key
        frame.src = `${BASE_URL}/mychat?api_key=${encodeURIComponent(API_KEY)}&v=${Date.now()}`;

        // ── Toggle open/close ─────────────────────────────────────────
        toggleBtn.addEventListener('click', () => container.classList.toggle('open'));
        document.getElementById('closeBtn').addEventListener('click', () => container.classList.remove('open'));

        // ── Dropdown ─────────────────────────────────────────────────
        document.getElementById('menuBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });
        document.addEventListener('click', () => dropdown.classList.remove('open'));

        // ── Reload Chat ──────────────────────────────────────────────
        document.getElementById('reloadBtn').addEventListener('click', () => {
            frame.src = frame.src;
        });

        // ── Restore Size ─────────────────────────────────────────────
        const restoreSize = () => {
            container.style.width  = '400px';
            container.style.height = '600px';
        };
        document.getElementById('restoreBtn').addEventListener('click', restoreSize);

        // ── Clear Chats — sends message into iframe ───────────────────
        document.getElementById('clearBtn').addEventListener('click', () => {
            dropdown.classList.remove('open');
            frame.contentWindow.postMessage({ type: 'getrio-request-clear' }, '*');
        });

        // ── Listen for messages from iframe ───────────────────────────
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'getrio-restore-size') restoreSize();
            if (e.data && e.data.type === 'getrio-close') container.classList.remove('open');
        });

        // ── Drag ─────────────────────────────────────────────────────
        let dragging = false, dragX = 0, dragY = 0, ox = 0, oy = 0;

        dragHandle.addEventListener('mousedown', (e) => {
            if (e.target.closest('button, #mychatDropdown')) return; // ignore button clicks
            dragging = true;
            dragX = e.clientX - ox;
            dragY = e.clientY - oy;
            dragHandle.style.cursor = 'grabbing';
            frame.style.pointerEvents = 'none';
        });
        document.addEventListener('mouseup', () => {
            dragging = false;
            dragHandle.style.cursor = 'grab';
            frame.style.pointerEvents = 'auto';
        });
        document.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            e.preventDefault();
            ox = e.clientX - dragX;
            oy = e.clientY - dragY;
            container.style.transform = `translate3d(${ox}px, ${oy}px, 0)`;
        });

        // ── Resize ───────────────────────────────────────────────────
        let resizing = false, rDir, rStartX, rStartY, rStartW, rStartH;
        const MIN_W = 300, MIN_H = 400;

        document.querySelectorAll('.resizer').forEach(r => {
            r.addEventListener('mousedown', (e) => {
                resizing = true;
                rDir    = e.target.dataset.dir;
                rStartX = e.clientX;
                rStartY = e.clientY;
                rStartW = parseInt(getComputedStyle(container).width);
                rStartH = parseInt(getComputedStyle(container).height);
                frame.style.pointerEvents = 'none';
                e.preventDefault();
            });
        });
        document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            const dx = e.clientX - rStartX;
            const dy = e.clientY - rStartY;
            if (rDir.includes('r'))  container.style.width  = Math.max(MIN_W, rStartW + dx) + 'px';
            if (rDir.includes('b'))  container.style.height = Math.max(MIN_H, rStartH + dy) + 'px';
            if (rDir.includes('t'))  container.style.height = Math.max(MIN_H, rStartH - dy) + 'px';
            if (rDir.includes('l')) {
                const nw = Math.max(MIN_W, rStartW - dx);
                if (nw > MIN_W) {
                    container.style.width = nw + 'px';
                    ox -= (e.clientX - rStartX);
                    container.style.transform = `translate3d(${ox}px, ${oy}px, 0)`;
                    rStartX = e.clientX;
                    rStartW = nw;
                }
            }
        });
        document.addEventListener('mouseup', () => {
            if (resizing) {
                resizing = false;
                frame.style.pointerEvents = 'auto';
            }
        });
    </script>
</body>
</html>
